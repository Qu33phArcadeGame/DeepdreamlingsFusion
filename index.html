<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dreamlings · Town 1</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;height:100%;background:#07040f;overflow:hidden;font-family:Helvetica,Arial,sans-serif;}
  #stage{position:fixed;inset:0;background:#0a0512;}
  #cabImg{position:absolute;pointer-events:none;}
  #screen{position:absolute;background:#000;touch-action:none;image-rendering:pixelated;filter:saturate(1.2) contrast(1.05);}
  #fx{position:absolute;pointer-events:none;z-index:4;mix-blend-mode:multiply;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.14) 0 1px, transparent 1px 3px),
               repeating-linear-gradient(90deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 3px);}
  #fx2{position:absolute;pointer-events:none;z-index:5;mix-blend-mode:screen;opacity:.16;
    background:radial-gradient(circle at 30% 25%, #6ae0ff 0%, transparent 55%), radial-gradient(circle at 75% 80%, #ff6ad5 0%, transparent 55%);}
  #err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#ffb3d1;background:#0d0a17;font-size:14px;padding:26px;text-align:center;line-height:1.6;z-index:9;}
  #dpad{position:absolute;}
  #dpad .dp{position:absolute;width:40%;height:40%;background:transparent;border:none;border-radius:12px;color:transparent;font-size:0;}
  #dpad .dp:active{background:rgba(138,255,234,.22);}
  #up{left:30%;top:0}#dn{left:30%;bottom:0}#lf{left:0;top:30%}#rt{right:0;top:30%}
  .rbtn{position:absolute;border-radius:50%;background:transparent;border:none;color:transparent;}
  .rbtn:active{background:rgba(255,255,255,.18);}
  video{display:none;}
</style>
</head>
<body>
<div id="stage">
  <img id="cabImg" alt="">
  <canvas id="screen"></canvas>
  <div id="fx"></div>
  <div id="fx2"></div>
  <div id="dpad"><div class="dp" id="up">▲</div><div class="dp" id="dn">▼</div><div class="dp" id="lf">◀</div><div class="dp" id="rt">▶</div></div>
  <div class="rbtn" id="aBtn"></div>
  <div class="rbtn" id="bBtn"></div>
  <div id="err"></div>
</div>
<video id="vU" muted playsinline preload="auto"></video>
<video id="vD" muted playsinline preload="auto"></video>
<video id="vL" muted playsinline preload="auto"></video>
<video id="vR" muted playsinline preload="auto"></video>

<script>
// ===== CABINET =====
const CAB_SRC="dreamlingoverlay.png";
const PF_PNG_W=1440, PF_PNG_H=2560;
const PF_SCREEN=[0.15,0.30,0.85,0.515];
const A_POS=[0.623,0.632], B_POS=[0.778,0.632];
const DP_C=[0.248,0.646], DP_SZ=0.19;

// ===== CONFIG =====
const START_MAP="map", START_ENTRY="start";
const ARCADE_FILE="deepdreamlings.html";     // real binder + cards + fuse animation
// Per-area config: map filename -> dreamling range, encounter-video prefix, character-sprite prefix
const AREAS={
  "map":   { first:1,  last:11, vid:"encounter", guy:"dreamguy",  name:"DREAM CORE" },
  "woods": { first:12, last:22, vid:"woods",     guy:"dreamwood", name:"WAKING WOODS" }
};
const DEFAULT_AREA=AREAS["map"];
let area=AREAS[START_MAP]||DEFAULT_AREA;

// ===== RARITY (town-side, tiers) =====
const TAG_VAL={red:15,green:35,blue:55};
const TAG_COLOR={red:"#ff5555",green:"#5dff8f",blue:"#5db4ff"};
function rollRarity(){ var r=Math.random()*100; return r<77?"red":(r<95?"green":"blue"); }   // 77 / 18 / 5

// ===== SAVE: game-compatible + tier map =====
if(localStorage.getItem("town_ver")!=="2"){ ["qu33phDLDex","qu33phDLHeld","qu33phDLFusions","qu33phDLRare","town_tier","town_companion","town2_col","town2_comp","town2_visited","town2_ver","dl_town1_boss","dl_town1_v1"].forEach(function(k){ try{localStorage.removeItem(k);}catch(e){} }); try{localStorage.setItem("town_ver","2");}catch(e){} }
function load(k,d){ try{ return JSON.parse(localStorage.getItem(k)||d); }catch(e){ return JSON.parse(d); } }
let retPos=null; try{ if(new URLSearchParams(location.search).get("ret")==="1") retPos=JSON.parse(localStorage.getItem("town_pos")||"null"); }catch(e){}
let dmDex=load("qu33phDLDex","[]"), dmHeld=load("qu33phDLHeld","[]"), dmRare=load("qu33phDLRare","[]");
let tier=load("town_tier","{}");
let tiers=load("town_tiers","{}");   // num -> [owned tiers]
let companion=load("town_companion","-1");  // a dreamling num, or -1
let visited=load("town_visited","{}");
let compImg=null; (function(){ try{ var d=localStorage.getItem("town_companion_img"); if(d && typeof companion!=="number"){ compImg=new Image(); compImg.onload=function(){ if(typeof draw==="function") draw(); }; compImg.src=d; } }catch(e){} })();
function saveGame(){ try{ localStorage.setItem("qu33phDLDex",JSON.stringify(dmDex)); localStorage.setItem("qu33phDLHeld",JSON.stringify(dmHeld)); localStorage.setItem("qu33phDLRare",JSON.stringify(dmRare)); localStorage.setItem("town_tier",JSON.stringify(tier)); localStorage.setItem("town_tiers",JSON.stringify(tiers)); localStorage.setItem("town_companion",JSON.stringify(companion)); localStorage.setItem("town_visited",JSON.stringify(visited)); }catch(e){} }
function areaCount(){ var n=0; for(var i=area.first;i<=area.last;i++) if(dmDex.indexOf(i)>=0) n++; return n; }

// ===== ASSETS: PIXEL sprites (dreamlingP), photo fallback =====
const sprP={}, sprPhoto={};
function pixSpr(n){ if(sprP[n]) return sprP[n]; var im=new Image(); var rec={img:im,ok:false}; im.onload=function(){rec.ok=true; if(typeof draw==="function")draw();}; im.onerror=function(){rec.ok=false;}; im.src="dreamlingP"+n+".png"; return sprP[n]=rec; }
function photoSpr(n){ if(sprPhoto[n]) return sprPhoto[n]; var im=new Image(); var rec={img:im,ok:false}; im.onload=function(){rec.ok=true; if(typeof draw==="function")draw();}; im.src="dreamling"+n+".png"; return sprPhoto[n]=rec; }
const tileCache={};
function tileImg(n){ return tileCache[n]||(tileCache[n]=(function(){const im=new Image();im.src=n;return im;})()); }
const guy={}; let guyFace="F";
function loadGuy(prefix){ ["F","B","L","R"].forEach(function(d){ var im=new Image(); im.onload=function(){if(typeof draw==="function")draw();}; im.src=prefix+d+".png"; guy[d]=im; }); }
const bobImg=new Image(); bobImg.src="bob.png";
const BOB={ map:"room1", x:2, y:2, text:"There's some crazy things in the water over there, go for a swim!" };
let currentMap="map", bobShown=false, bobTalks=0, dialogue=null;
let waterSaid = (localStorage.getItem("town_water_said")==="1");
function say(t){ dialogue=t; }
const encVid={ U:document.getElementById("vU"), D:document.getElementById("vD"), L:document.getElementById("vL"), R:document.getElementById("vR") };
function loadVids(prefix){ encVid.U.src=prefix+"U.mp4"; encVid.D.src=prefix+"D.mp4"; encVid.L.src=prefix+"R.mp4"; encVid.R.src=prefix+"L.mp4"; }
function setArea(name){ area=AREAS[name]||DEFAULT_AREA; loadGuy(area.guy); loadVids(area.vid); }
let lastStepAt=0, leaves=[], motes=[];
const LEAF_COLORS=["#6aa84c","#c9a04c","#4caf9a","#8fbf5a","#d98cff","#7ad6c0"];
const MOTE_COLORS=["#8affea","#c9a0ff","#ffe08a"];
function isWater(idx){ return M && M.tiles && M.tiles[idx] && /water/i.test(M.tiles[idx]); }
function isTree(idx){ return M && M.tiles && M.tiles[idx] && /^tree[12]\.png$/i.test(M.tiles[idx]); }

// ===== PIXEL CREATURE RENDER (rarity tint matches shiny idea) =====
function rarityFilter(t){ var hue={green:40,blue:135,purple:215}[t]; if(hue==null) return "none"; return "invert(1) hue-rotate("+hue+"deg) saturate(165%)"; }
function drawPix(num,cx,cy,size,t){ var rp=pixSpr(num); var rec=rp.ok?rp:photoSpr(num); x.save(); x.imageSmoothingEnabled=false; x.filter=rarityFilter(t);
  if(rec&&rec.ok){ x.drawImage(rec.img,Math.round(cx-size/2),Math.round(cy-size/2),Math.round(size),Math.round(size)); }
  else { x.filter="none"; x.fillStyle="#5a3a8a"; x.beginPath(); x.arc(cx,cy,size*0.4,0,7); x.fill(); x.fillStyle="#fff"; x.font="bold "+Math.floor(size*0.4)+"px sans-serif"; x.textAlign="center"; x.textBaseline="middle"; x.fillText(num,cx,cy); }
  x.restore(); x.filter="none";
  if(t!=="red"){ x.save(); x.globalCompositeOperation="overlay"; var o=(Date.now()/700)%1; var g=x.createLinearGradient(cx-size/2,cy-size/2,cx+size/2,cy+size/2); g.addColorStop(Math.max(0,o-0.2),"rgba(255,255,255,0)"); g.addColorStop(o,"rgba(255,255,255,"+(t==="blue"?0.4:0.22)+")"); g.addColorStop(Math.min(1,o+0.2),"rgba(255,255,255,0)"); x.fillStyle=g; x.fillRect(cx-size/2,cy-size/2,size,size); x.restore(); }
}
function drawDot(t,cx,cy){ x.fillStyle=TAG_COLOR[t]||"#fff"; x.beginPath(); x.arc(cx,cy,4,0,7); x.fill(); x.strokeStyle="rgba(0,0,0,.5)"; x.lineWidth=1; x.stroke(); }
function compTier(){ if(typeof companion==="number") return tier[companion]||"red"; if(companion&&companion.t) return companion.t; return "red"; }
function drawCompanionSprite(cx,cy,size){
  if(typeof companion!=="number" && compImg && compImg.complete && compImg.naturalWidth){ x.imageSmoothingEnabled=false; var sc=size*1.9; x.drawImage(compImg,cx-sc/2,cy-sc*0.55,sc,sc); return; }
  var num=(typeof companion==="number")?companion:((companion&&companion.comp&&companion.comp.length)?companion.comp[0]:null);
  var t=(typeof companion==="number")?(tier[companion]||"red"):((companion&&companion.t)||"red");
  if(num==null) return; drawPix(num,cx,cy,size,t); }

// ===== CANVAS / LAYOUT =====
const stage=document.getElementById("stage"), cabImg=document.getElementById("cabImg"), cv=document.getElementById("screen"), x=cv.getContext("2d");
cabImg.onerror=()=>{ cabImg.style.display="none"; }; cabImg.src=CAB_SRC;
let W,H,DPR;
function place(el,cx,cy,d){ el.style.left=(cx-d/2)+"px"; el.style.top=(cy-d/2)+"px"; el.style.width=d+"px"; el.style.height=d+"px"; }
function layout(){
  const sw=stage.clientWidth, sh=stage.clientHeight;
  const scale=Math.min(sw/PF_PNG_W, sh/PF_PNG_H), rw=PF_PNG_W*scale, rh=PF_PNG_H*scale, ox=(sw-rw)/2, oy=(sh-rh)/2;
  cabImg.style.left=ox+"px"; cabImg.style.top=oy+"px"; cabImg.style.width=rw+"px"; cabImg.style.height=rh+"px";
  const scX=PF_SCREEN[0],scY=PF_SCREEN[1],scW=PF_SCREEN[2]-PF_SCREEN[0],scH=PF_SCREEN[3]-PF_SCREEN[1];
  const cl=ox+scX*rw, ct=oy+scY*rh, cw=scW*rw, ch=scH*rh;
  cv.style.left=cl+"px"; cv.style.top=ct+"px"; cv.style.width=cw+"px"; cv.style.height=ch+"px";
  var PIXEL=0.5;   // lower = chunkier pixels (0.4 GameBoy-ish, 0.6 DS-ish)
  W=cw; H=ch; DPR=devicePixelRatio||1; cv.width=Math.max(64,Math.round(cw*PIXEL)); cv.height=Math.max(48,Math.round(ch*PIXEL)); x.setTransform(PIXEL,0,0,PIXEL,0,0);
  var fx=document.getElementById("fx"), fx2=document.getElementById("fx2");
  [fx,fx2].forEach(function(el){ if(el){ el.style.left=cl+"px"; el.style.top=ct+"px"; el.style.width=cw+"px"; el.style.height=ch+"px"; } });
  const dp=document.getElementById("dpad"), dsz=DP_SZ*rw;
  dp.style.left=(ox+DP_C[0]*rw-dsz/2)+"px"; dp.style.top=(oy+DP_C[1]*rh-dsz/2)+"px"; dp.style.width=dsz+"px"; dp.style.height=dsz+"px";
  const bd=0.15*rw; place(document.getElementById("aBtn"), ox+A_POS[0]*rw, oy+A_POS[1]*rh, bd); place(document.getElementById("bBtn"), ox+B_POS[0]*rw, oy+B_POS[1]*rh, bd);
  draw();
}
addEventListener("resize",layout);

// ===== MAP / WALK =====
let M=null,T=64,px=0,py=0,mode="walk",inZone=false,orbit=0,tiles=[];
function loadMap(name,entry){
  fetch(name+".json").then(r=>{ if(!r.ok) throw new Error(name+".json ("+r.status+")"); return r.json(); })
   .then(d=>{ M=d; T=d.tileSize||64; currentMap=name; setArea(name); if(name===BOB.map) bobShown=false; tiles=(d.tiles||[]).map(n=>{const im=tileImg(n); if(!im.complete)im.addEventListener("load",draw); return im;});
     const sp=(d.spawns||[]).find(s=>s.name===entry)||(d.spawns||[]).find(s=>s.name==="start")||(d.spawns||[])[0];
     px=sp?sp.x:Math.floor((d.cols||1)/2); py=sp?sp.y:Math.floor((d.rows||1)/2); if(retPos){ px=retPos.x; py=retPos.y; if(retPos.f) guyFace=retPos.f; retPos=null; } inZone=zoneAt(px,py); layout(); })
   .catch(e=>{ const el=document.getElementById("err"); el.innerHTML="Couldn't load <b>"+name+".json</b>.<br>"+e.message; el.style.display="flex"; });
}
function solidAt(c,r){ if(!M) return true; if(c<0||r<0||c>=M.cols||r>=M.rows) return true; return !!(M.solid&&M.solid[r][c]); }
function zoneAt(c,r){ if(!M) return false; const g=M.encounter||M.enc; return !!(g&&g[r]&&g[r][c]); }
function walkStep(dx,dy){ if(!M||dialogue) return; if(dx<0)guyFace="L"; else if(dx>0)guyFace="R"; else if(dy<0)guyFace="B"; else if(dy>0)guyFace="F"; const nc=px+dx,nr=py+dy;
  if(currentMap===BOB.map && nc===BOB.x && nr===BOB.y){ bobTalks++; say(bobTalks>=2?"Be careful though, I get lost sometimes":BOB.text); draw(); return; }
  if(solidAt(nc,nr)){ draw(); return; } px=nc; py=nr; lastStepAt=Date.now();
  const w=(M.warps||[]).find(o=>o.x===px&&o.y===py); if(w){ loadMap(w.toMap,w.entry||"start"); return; }
  if(!waterSaid && isWater(M.map[py][px])){ waterSaid=true; try{localStorage.setItem("town_water_said","1");}catch(e){} say("Am I dreaming? I'm walking on this water"); draw(); return; }
  const nz=zoneAt(px,py); if(nz&&!inZone){ inZone=true; startEncounter(); return; } if(!nz) inZone=false; draw(); }

// ===== DRAW ROUTER =====
function draw(){ if(!W) return; x.clearRect(0,0,W,H); x.filter="none"; x.globalAlpha=1; x.globalCompositeOperation="source-over";
  if(mode==="walk"){ drawWalk(); if(dialogue) drawDialogue(); } else if(mode==="encounter") drawEncounter(); else if(mode==="prompt"){ drawEncounter(); drawPrompt(); } }
function drawDialogue(){ var bh=Math.max(50,H*0.24); var by=H-bh-8; x.fillStyle="rgba(8,5,18,0.93)"; roundRect(8,by,W-16,bh,10); x.fill(); x.strokeStyle="#c9a0ff"; x.lineWidth=2; roundRect(8,by,W-16,bh,10); x.stroke();
  x.fillStyle="#eee"; x.font="bold 13px sans-serif"; x.textAlign="left"; x.textBaseline="top";
  var words=dialogue.split(" "), line="", maxw=W-40, lines=[]; for(var i=0;i<words.length;i++){ var test=line+words[i]+" "; if(x.measureText(test).width>maxw && line){ lines.push(line); line=words[i]+" "; } else line=test; } lines.push(line);
  for(var j=0;j<lines.length;j++) x.fillText(lines[j], 20, by+12+j*18);
  x.fillStyle="#8affea"; x.font="11px sans-serif"; x.textAlign="right"; x.fillText("\u25B6 A", W-20, by+bh-16); }
function roundRect(rx,ry,rw,rh,rad){ x.beginPath(); x.moveTo(rx+rad,ry); x.arcTo(rx+rw,ry,rx+rw,ry+rh,rad); x.arcTo(rx+rw,ry+rh,rx,ry+rh,rad); x.arcTo(rx,ry+rh,rx,ry,rad); x.arcTo(rx,ry,rx+rw,ry,rad); x.closePath(); }

function drawWalk(){
  if(!M){ x.fillStyle="#0d0a17"; x.fillRect(0,0,W,H); return; }
  const s=Math.max(0.45,Math.min(2.6,W/(22*T))), sz=T*s; let camx=(px+0.5)*T-W/(2*s), camy=(py+0.5)*T-H/(2*s);
  const c0=Math.max(0,Math.floor(camx/T)),r0=Math.max(0,Math.floor(camy/T)),c1=Math.min(M.cols-1,Math.floor((camx+W/s)/T)),r1=Math.min(M.rows-1,Math.floor((camy+H/s)/T));
  const now=Date.now(); const treeCells=[]; x.imageSmoothingEnabled=true;
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){ const idx=M.map[r][c]; if(idx<0||!tiles[idx]||!tiles[idx].complete||!tiles[idx].naturalWidth) continue;
    const dx=Math.round((c*T-camx)*s),dy=Math.round((r*T-camy)*s); x.fillStyle="#241a34"; x.fillRect(dx,dy,Math.ceil(sz)+1,Math.ceil(sz)+1); x.drawImage(tiles[idx],dx,dy,Math.ceil(sz)+1,Math.ceil(sz)+1); if(isTree(idx)) treeCells.push({x:dx+sz/2,y:dy+sz*0.3});
    if(isWater(idx)){ var wph=now/650+c*0.6+r*0.4; x.fillStyle="rgba(170,225,255,"+(0.05+0.05*Math.sin(wph))+")"; x.fillRect(dx,dy,sz,sz); x.strokeStyle="rgba(255,255,255,0.10)"; x.lineWidth=Math.max(1,sz*0.045); var wy=dy+(0.28+0.44*(0.5+0.5*Math.sin(wph)))*sz; x.beginPath(); x.moveTo(dx,wy); x.lineTo(dx+sz,wy+Math.sin(wph*1.3)*sz*0.08); x.stroke(); }
    if(M.border>0){const lw=Math.max(1,M.border*s);x.strokeStyle="#000";x.lineWidth=lw;x.strokeRect(dx+lw/2,dy+lw/2,sz-lw,sz-lw);} }
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){ if(zoneAt(c,r)){ const dx=Math.round((c*T-camx)*s),dy=Math.round((r*T-camy)*s); x.fillStyle="rgba(150,90,255,"+(0.16+0.10*Math.sin(now/300+c+r))+")"; x.fillRect(dx,dy,sz,sz); } }
  if(currentMap===BOB.map && bobImg.complete && bobImg.naturalWidth){ var bbx=Math.round((BOB.x*T-camx)*s), bby=Math.round((BOB.y*T-camy)*s), bw=sz*1.0, bhh=sz*1.4; x.imageSmoothingEnabled=true; x.drawImage(bobImg, bbx+sz/2-bw/2, bby+sz-bhh+sz*0.1+Math.sin(now/500)*sz*0.03, bw, bhh); }
  const ppx=Math.round((px*T-camx)*s),ppy=Math.round((py*T-camy)*s), pcx=ppx+sz/2, pcy=ppy+sz/2;
  const bounce=Math.max(0,1-(now-lastStepAt)/240), bounceY=-Math.sin(bounce*Math.PI)*sz*0.16, idleY=Math.sin(now/500)*sz*0.05*(1-bounce);
  orbit+=0.03;
  var hasComp=(companion!=null && companion!==-1);
  if(hasComp){ var oa=orbit, ox2=pcx+Math.cos(oa)*sz*0.9, oy2=pcy+Math.sin(oa)*sz*0.5-sz*0.1; if(Math.sin(oa)<0){ drawCompanionSprite(ox2,oy2,sz*1.15); } }
  const gim=guy[guyFace]; x.imageSmoothingEnabled=true;
  if(gim&&gim.complete&&gim.naturalWidth){ const pw2=sz*1.05, ph2=sz*1.5; x.drawImage(gim, ppx+sz/2-pw2/2, ppy+sz-ph2+sz*0.12+bounceY+idleY, pw2, ph2); }
  else { x.fillStyle="#8affea";x.strokeStyle="#0d0a17";x.lineWidth=Math.max(2,sz*0.06);x.beginPath();x.arc(pcx,pcy+bounceY+idleY,sz*0.3,0,7);x.fill();x.stroke(); }
  if(hasComp){ var oa2=orbit, ox3=pcx+Math.cos(oa2)*sz*0.9, oy3=pcy+Math.sin(oa2)*sz*0.5-sz*0.1; if(Math.sin(oa2)>=0){ drawCompanionSprite(ox3,oy3,sz*1.15); } }
  updateLeaves(now,treeCells); drawLeaves(); updateMotes(now); drawMotes();
  x.fillStyle="rgba(13,10,23,.7)"; roundRect(6,6,222,22,7); x.fill(); x.fillStyle="#c9a0ff"; x.font="11px sans-serif"; x.textAlign="left"; x.textBaseline="middle"; x.fillText(area.name+" · "+areaCount()+"/"+(area.last-area.first+1)+" · B=Binder",12,18);
}
function updateLeaves(now,treeCells){ if(treeCells&&treeCells.length&&leaves.length<22&&Math.random()<0.5){ var tc=treeCells[Math.floor(Math.random()*treeCells.length)]; leaves.push({x:tc.x+(Math.random()-0.5)*22,y:tc.y+(Math.random()-0.5)*16,vy:0.3+Math.random()*0.7,sway:0.5+Math.random()*1.1,ph:Math.random()*6,spin:(Math.random()-0.5)*0.12,rot:Math.random()*6,size:6+Math.random()*8,col:LEAF_COLORS[Math.floor(Math.random()*LEAF_COLORS.length)]}); }
  for(var i=0;i<leaves.length;i++){ var l=leaves[i]; l.y+=l.vy; l.x+=Math.sin(l.ph)*l.sway*0.5; l.ph+=0.03; l.rot+=l.spin; } leaves=leaves.filter(function(l){return l.y<H+16;}); }
function drawLeaves(){ x.filter="none"; x.imageSmoothingEnabled=true; for(var i=0;i<leaves.length;i++){ var l=leaves[i]; x.save(); x.translate(l.x,l.y); x.rotate(l.rot); x.globalAlpha=0.82; x.fillStyle=l.col; x.beginPath(); x.ellipse(0,0,l.size*0.5,l.size*0.28,0,0,7); x.fill(); x.strokeStyle="rgba(0,0,0,0.22)"; x.lineWidth=1; x.beginPath(); x.moveTo(-l.size*0.5,0); x.lineTo(l.size*0.5,0); x.stroke(); x.restore(); } x.globalAlpha=1; }
function updateMotes(now){ if(motes.length<14&&Math.random()<0.12){ motes.push({x:Math.random()*W,y:H+8,vx:(Math.random()-0.5)*0.3,vy:-0.12-Math.random()*0.28,ph:Math.random()*6,r:2+Math.random()*3.2,col:MOTE_COLORS[Math.floor(Math.random()*MOTE_COLORS.length)]}); }
  for(var i=0;i<motes.length;i++){ var m=motes[i]; m.ph+=0.02; m.x+=m.vx+Math.sin(m.ph)*0.25; m.y+=m.vy; } motes=motes.filter(function(m){return m.y>-12;}); }
function drawMotes(){ x.filter="none"; for(var i=0;i<motes.length;i++){ var m=motes[i]; var a=0.25+0.25*Math.sin(m.ph*1.5); var g=x.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*4); g.addColorStop(0,m.col); g.addColorStop(1,"rgba(0,0,0,0)"); x.globalAlpha=a; x.fillStyle=g; x.beginPath(); x.arc(m.x,m.y,m.r*4,0,7); x.fill(); } x.globalAlpha=1; }

// ===== ENCOUNTER (video + pixel dreamlings + rarity) =====
const DIRV={U:[0,-1],D:[0,1],L:[-1,0],R:[1,0]};
let enc=null;
function startEncounter(){
  var dir={B:"U",F:"D",L:"L",R:"R"}[guyFace]||"U"; var fwd=DIRV[dir], perp=[-fwd[1],fwd[0]];
  var cxN=0.5-fwd[0]*0.06, cyN=0.5-fwd[1]*0.06; var mons=[];
  for(var i=0;i<3;i++){ var off=(i-1)*0.26; mons.push({num:area.first+Math.floor(Math.random()*(area.last-area.first+1)), t:rollRarity(), x:cxN+fwd[0]*0.22+perp[0]*off, y:cyN+fwd[1]*0.22+perp[1]*off, ph:Math.random()*6, fled:false}); }
  enc={ dir:dir, mons:mons, grow:0, holdT:0, vidStarted:false, px:cxN-fwd[0]*0.22, py:cyN-fwd[1]*0.22, done:false, msg:"" };
  mode="encounter";
}
function boxRect(){ var bs=Math.min(W,H)*0.8*(0.3+0.7*enc.grow); return {x:W/2-bs/2, y:H/2-bs/2, s:bs}; }
function drawMapBg(){ if(!M){ x.fillStyle="#0d0a17"; x.fillRect(0,0,W,H); return; }
  const s=Math.max(0.45,Math.min(2.6,W/(22*T))), sz=T*s; let camx=(px+0.5)*T-W/(2*s), camy=(py+0.5)*T-H/(2*s);
  const c0=Math.max(0,Math.floor(camx/T)),r0=Math.max(0,Math.floor(camy/T)),c1=Math.min(M.cols-1,Math.floor((camx+W/s)/T)),r1=Math.min(M.rows-1,Math.floor((camy+H/s)/T));
  x.imageSmoothingEnabled=true;
  for(let r=r0;r<=r1;r++)for(let c=c0;c<=c1;c++){ const idx=M.map[r][c]; if(idx<0||!tiles[idx]||!tiles[idx].complete||!tiles[idx].naturalWidth) continue; const dx=Math.round((c*T-camx)*s),dy=Math.round((r*T-camy)*s); x.drawImage(tiles[idx],dx,dy,Math.ceil(sz)+1,Math.ceil(sz)+1); } }
function drawEncounter(){ if(!enc) return;
  enc.holdT++; var HOLD=0;
  if(enc.holdT>HOLD){ if(!enc.vidStarted){ enc.vidStarted=true; var vv=encVid[enc.dir]; if(vv){ try{ vv.currentTime=0; var pr=vv.play(); if(pr&&pr.catch)pr.catch(function(){}); }catch(e){} } } if(enc.grow<1) enc.grow=Math.min(1,enc.grow+0.08); }
  var b=boxRect();
  drawMapBg(); x.fillStyle="rgba(5,3,12,0.6)"; x.fillRect(0,0,W,H); var v=encVid[enc.dir];
  x.save(); roundRect(b.x,b.y,b.s,b.s,10); x.clip();
  if(enc.vidStarted && v && v.readyState>=2){ try{ x.imageSmoothingEnabled=true; x.drawImage(v,b.x,b.y,b.s,b.s); }catch(e){ encBg(b); } } else encBg(b);
  var psz=b.s*0.2, pcx=b.x+enc.px*b.s, pcy=b.y+enc.py*b.s, face=({U:"B",D:"F",L:"L",R:"R"})[enc.dir], gim=guy[face], bob=Math.sin(Date.now()/400)*psz*0.05;
  x.imageSmoothingEnabled=true;
  if(gim&&gim.complete&&gim.naturalWidth){ var pw=psz*1.05, ph=psz*1.5; x.drawImage(gim,pcx-pw/2,pcy-ph+psz*0.5+bob,pw,ph); } else { x.fillStyle="#8affea"; x.beginPath(); x.arc(pcx,pcy+bob,psz*0.4,0,7); x.fill(); }
  if(enc.grow>=0.9){ for(var i=0;i<enc.mons.length;i++){ var m=enc.mons[i]; if(m.fled) continue; var mx=b.x+m.x*b.s, my=b.y+m.y*b.s+Math.sin(Date.now()/500+m.ph)*psz*0.12; drawPix(m.num,mx,my,psz*1.7,m.t); x.filter="none"; drawDot(m.t,mx,my+psz*1.0); } }
  x.restore();
  x.fillStyle="#c9a0ff"; x.font="bold 12px sans-serif"; x.textAlign="center"; x.textBaseline="top";
  x.fillText((companion==null||companion===-1)?"Walk into one — free first pick!":"Walk into one to try collecting it",W/2,6);
  if(enc.msg){ x.fillStyle="#8affea"; x.font="bold 13px sans-serif"; x.textBaseline="bottom"; x.fillText(enc.msg,W/2,H-8); }
}
function encBg(b){ var g=x.createRadialGradient(W/2,H/2,10,W/2,H/2,b.s*0.7); g.addColorStop(0,"#3a1a66"); g.addColorStop(1,"#0a0518"); x.fillStyle=g; x.fillRect(b.x,b.y,b.s,b.s); }
function encMove(dx,dy){ if(!enc||enc.done) return; enc.px=Math.max(0.12,Math.min(0.88,enc.px+dx*0.055)); enc.py=Math.max(0.12,Math.min(0.88,enc.py+dy*0.055));
  for(var i=0;i<enc.mons.length;i++){ var m=enc.mons[i]; if(m.fled) continue; if(Math.hypot(enc.px-m.x,enc.py-m.y)<0.12){ attempt(m); break; } } draw(); }
function attempt(m){ if(enc.done) return; var free=!visited[currentMap];
  var chance = free?1:( (typeof companion==="number") ? (TAG_VAL[tier[companion]||"red"]/100) : 0.9 );
  if(Math.random()<chance){ collectMon(m); }
  else { m.fled=true; enc.msg=dreamName(m.num)+" fled!"; if(enc.mons.every(function(mm){return mm.fled;})){ enc.done=true; setTimeout(function(){ mode="walk"; inZone=true; },900); } draw(); }
}
function dreamName(n){ return "#"+n; }
function collectMon(m){ enc.done=true; visited[currentMap]=1;
  var isNew=(dmDex.indexOf(m.num)<0); if(isNew) dmDex.push(m.num); dmHeld.push(m.num);
  if(!tier[m.num] || TAG_VAL[m.t]>TAG_VAL[tier[m.num]]) tier[m.num]=m.t;
  if(!tiers[m.num]) tiers[m.num]=[]; if(tiers[m.num].indexOf(m.t)<0) tiers[m.num].push(m.t);
  if(m.t!=="red" && dmRare.indexOf(m.num)<0) dmRare.push(m.num);
  var first=(companion==null||companion===-1);
  if(first){ companion=m.num; compImg=null; try{localStorage.removeItem("town_companion_img");}catch(e){} saveGame(); enc.msg="Collected #"+m.num+"!"; setTimeout(function(){ mode="walk"; inZone=true; if(!localStorage.getItem("town_tut")){ try{localStorage.setItem("town_tut","1");}catch(e){} say("Nice — that dreamling now circles you! Hold the RED button to run around faster."); } draw(); },1100); }
  else { saveGame(); promptCompanion(m.num); }
  draw();
}
// ===== COMPANION PROMPT =====
let prompt=null;
function promptCompanion(num){ prompt={num:num}; mode="prompt"; draw(); }
function drawPrompt(){ x.fillStyle="rgba(6,3,14,.85)"; x.fillRect(0,0,W,H); x.fillStyle="#eee"; x.font="bold 14px sans-serif"; x.textAlign="center"; x.textBaseline="middle"; x.fillText("Collected #"+prompt.num+"!  Set as companion?",W/2,H/2-26);
  x.fillStyle="#3fe0b0"; roundRect(W/2-104,H/2,96,34,9); x.fill(); x.fillStyle="#ff8fbf"; roundRect(W/2+8,H/2,96,34,9); x.fill();
  x.fillStyle="#08120e"; x.font="bold 13px sans-serif"; x.fillText("YES (A)",W/2-56,H/2+17); x.fillText("NO (B)",W/2+56,H/2+17);
  prompt._yes={x:W/2-104,y:H/2,w:96,h:34}; prompt._no={x:W/2+8,y:H/2,w:96,h:34}; }
function promptYes(){ companion=prompt.num; compImg=null; try{localStorage.removeItem("town_companion_img");}catch(e){} saveGame(); prompt=null; mode="walk"; inZone=true; draw(); }
function promptNo(){ prompt=null; mode="walk"; inZone=true; draw(); }

// ===== INPUT =====
function onDir(dx,dy){ if(mode==="walk") walkStep(dx,dy); else if(mode==="encounter") encMove(dx,dy); }
function onA(){ if(dialogue){ dialogue=null; draw(); return; } if(mode==="prompt") promptYes(); }
function onB(){ if(mode==="walk"){ try{localStorage.setItem("town_pos",JSON.stringify({x:px,y:py,f:guyFace,map:currentMap}));}catch(e){} saveGame(); location.href=ARCADE_FILE+"?view=binder&town=1"; } else if(mode==="prompt") promptNo(); }
let running=false;
function bindHold(id,fn){ const el=document.getElementById(id); let t=null, held=false;
  function step(){ if(!held) return; fn(); t=setTimeout(step, running?70:150); }
  const on=e=>{ e.preventDefault(); if(held) return; held=true; fn(); t=setTimeout(step, running?70:150); };
  const off=e=>{ if(e)e.preventDefault(); held=false; clearTimeout(t); };
  el.addEventListener("touchstart",on,{passive:false}); el.addEventListener("touchend",off); el.addEventListener("touchcancel",off); el.addEventListener("mousedown",on); el.addEventListener("mouseup",off); el.addEventListener("mouseleave",off); }
bindHold("up",()=>onDir(0,-1)); bindHold("dn",()=>onDir(0,1)); bindHold("lf",()=>onDir(-1,0)); bindHold("rt",()=>onDir(1,0));
(function(){ var a=document.getElementById("aBtn"); function down(e){ e.preventDefault(); running=true; onA(); } function up(){ running=false; }
  a.addEventListener("touchstart",down,{passive:false}); a.addEventListener("touchend",up); a.addEventListener("touchcancel",up); a.addEventListener("mousedown",down); a.addEventListener("mouseup",up); a.addEventListener("mouseleave",up); })();
function tapBtn(id,fn){ const el=document.getElementById(id); el.addEventListener("touchstart",e=>{e.preventDefault();fn();},{passive:false}); el.addEventListener("mousedown",e=>{e.preventDefault();fn();}); }
tapBtn("bBtn",onB);
addEventListener("keydown",e=>{ const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]}[e.key]; if(m){e.preventDefault();onDir(m[0],m[1]);} else if(e.key==="a"||e.key==="Enter"||e.key===" "){e.preventDefault();onA();} else if(e.key==="b"){onB();} });
function loop(){ draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// ===== START =====
var _startMap=(retPos&&retPos.map)?retPos.map:START_MAP; setArea(_startMap); layout(); loadMap(_startMap,START_ENTRY);
</script>
